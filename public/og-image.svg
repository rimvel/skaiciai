<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Skaičiukų sodas social image">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#d6f0e4"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#eef8ff" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#sky)"/>
  <circle cx="1010" cy="110" r="72" fill="#ffe08a" opacity="0.9"/>
  <circle cx="188" cy="120" r="34" fill="#ffffff" opacity="0.7"/>
  <circle cx="244" cy="120" r="26" fill="#ffffff" opacity="0.7"/>
  <circle cx="286" cy="120" r="22" fill="#ffffff" opacity="0.7"/>
  <rect x="110" y="110" width="980" height="410" rx="38" fill="url(#card)"/>
  <text x="160" y="205" fill="#267a52" font-family="Trebuchet MS, sans-serif" font-size="34" font-weight="700" letter-spacing="4">SKAIČIUKŲ SODAS</text>
  <text x="160" y="300" fill="#20304d" font-family="Trebuchet MS, sans-serif" font-size="78" font-weight="700">Sudėtis ir atimtis</text>
  <text x="160" y="372" fill="#31506f" font-family="Trebuchet MS, sans-serif" font-size="42">Lietuviškas žaidimas vaikams su užduotimis, stulpeliu,</text>
  <text x="160" y="426" fill="#31506f" font-family="Trebuchet MS, sans-serif" font-size="42">užuominomis ir žaismingais apdovanojimais.</text>

  <g transform="translate(780 210)">
    <rect width="220" height="180" rx="28" fill="#fffef6" stroke="#dce9f5"/>
    <text x="36" y="58" fill="#20304d" font-family="Courier New, monospace" font-size="58" font-weight="700"> 17</text>
    <text x="18" y="118" fill="#20304d" font-family="Courier New, monospace" font-size="58" font-weight="700">+16</text>
    <line x1="28" y1="138" x2="184" y2="138" stroke="#20304d" stroke-width="7" stroke-linecap="round"/>
    <text x="36" y="182" fill="#175136" font-family="Courier New, monospace" font-size="58" font-weight="700"> 33</text>
    <circle cx="152" cy="18" r="16" fill="#9ed8ff" opacity="0.7"/>
    <text x="145" y="24" fill="#31506f" font-family="Trebuchet MS, sans-serif" font-size="22" font-weight="700">1</text>
  </g>

  <g transform="translate(160 470)">
    <circle cx="0" cy="0" r="16" fill="#8fd7a6"/>
    <text x="-6" y="6" fill="#20304d" font-family="Trebuchet MS, sans-serif" font-size="24" font-weight="700">+</text>
    <text x="32" y="8" fill="#31506f" font-family="Trebuchet MS, sans-serif" font-size="28">Užduotys ir pasirinkimai</text>
    <circle cx="346" cy="0" r="16" fill="#ffe08a"/>
    <text x="340" y="6" fill="#20304d" font-family="Trebuchet MS, sans-serif" font-size="24" font-weight="700">?</text>
    <text x="378" y="8" fill="#31506f" font-family="Trebuchet MS, sans-serif" font-size="28">Aiškios užuominos</text>
    <circle cx="654" cy="0" r="16" fill="#9ed8ff"/>
    <text x="648" y="6" fill="#20304d" font-family="Trebuchet MS, sans-serif" font-size="24" font-weight="700">★</text>
    <text x="686" y="8" fill="#31506f" font-family="Trebuchet MS, sans-serif" font-size="28">Žvaigždutės ir lipdukai</text>
  </g>
